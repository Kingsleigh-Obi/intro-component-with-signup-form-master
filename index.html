<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/style.css">
  <title>Frontend Mentor | Intro component with sign up form</title>

</head>
<body>
  <main class="main-container">
    <section class="main-description">
      <h1>Learn to code by watching others</h1>
      <p>
        See how experienced developers solve problems in real-time. Watching scripted tutorials is great, but understanding how developers think is invaluable.
      </p>
    </section>

    <section class="main-form">
      <p class="trial-info">
        Try it free 7 days <span class="lighter-info">then $20/mo. thereafter</span>
      </p>

      <form>
        <div class="input-boxes">
          <input type="text" id="first-name" name="first-name" placeholder="First Name" required>

          <input type="text" id="last-name" name="last-name" placeholder="Last Name" required>

          <input type="email" id="email" name="email" placeholder="Email Address" required>

          <input type="password" id="password" name="password" placeholder="Password" required>

          <button type="submit">  CLAIM YOUR FREE TRIAL</button>

          <p class="instruction">
            <span class="clicking-button">By clicking the button, you are agreeing to our</span> 
            <span class="terms-and-condition">Terms and Services</span>
          </p>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
